name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

concurrency:
  group: openwrt-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  GOPROXY: https://goproxy.cn,https://proxy.golang.org,direct
  GOSUMDB: sum.golang.org
  GO111MODULE: on
  GOFLAGS: -buildvcs=false -mod=mod
  GONOSUMDB: "*"
  GONOSUMCHECK: "*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        sudo apt-get -qq update
        sudo apt-get -qq install --no-install-recommends \
          build-essential asciidoc binutils bzip2 gawk gettext \
          libncurses-dev libz-dev patch python3 unzip zlib1g-dev \
          libc6-dev-i386 subversion flex uglifyjs gcc-multilib \
          p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev \
          xmlto qemu-utils upx libelf-dev autoconf automake libtool \
          autopoint device-tree-compiler ccache
        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        df -hT $PWD
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        for i in 1 2 3; do git clone $REPO_URL -b $REPO_BRANCH openwrt && break || sleep 30; done

    - name: Restore ccache
      id: ccache-restore
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-x86_64-${{ hashFiles('.config') }}-${{ github.run_number }}
        restore-keys: |
          ccache-x86_64-${{ hashFiles('.config') }}-
          ccache-x86_64-

    - name: Load custom feeds
      run: |
        set -euo pipefail
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        cd openwrt
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        for i in 1 2 3; do ./scripts/feeds update -a && break || sleep 30; done

    - name: Install feeds
      run: |
        set -euo pipefail
        cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        set -euo pipefail
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')

    - name: Restore downloaded sources cache
      id: dl-cache
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: openwrt-dl-${{ hashFiles('.config', 'diy-part1.sh') }}
        restore-keys: |
          openwrt-dl-

    - name: Download package
      id: package
      run: |
        set -euo pipefail
        cd openwrt
        make defconfig
        make download -j8 V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Fix build issues
      run: |
        set -euo pipefail
        cd openwrt
        
        # Fix 1: kmod-sound-hda-codec-realtek - missing snd-hda-codec-realtek-lib.ko on Linux 6.18+
        echo "=== Fixing kmod-sound-hda-codec-realtek ==="
        # Add to kernel config directly
        echo "CONFIG_SND_HDA_CODEC_REALTEK_LIB=m" >> .config
        echo "CONFIG_SND_HDA_CODEC_REALTEK_LIB=m" >> target/linux/x86/64/config-6.18 2>/dev/null || true
        echo "CONFIG_SND_HDA_CODEC_REALTEK_LIB=m" >> target/linux/generic/config-6.18 2>/dev/null || true
        make kernel_oldconfig V=s 2>&1 | tail -20 || true
        echo "  kmod-sound fix applied"
        
        # Fix 2: Go packages (mihomo, trojan-go) - use system Go with proper env
        echo "=== Fixing Go build environment ==="
        export GO111MODULE=on
        export GOFLAGS="-buildvcs=false -mod=mod"
        export GONOSUMDB="*"
        export GONOSUMCHECK="*"
        export GOMODCACHE="$PWD/dl/go-mod-cache"
        export GOEXPERIMENT=""
        # Ensure GOPROXY is reachable
        echo "  GOPROXY=$GOPROXY"
        echo "  GOFLAGS=$GOFLAGS"
        
        # Fix 3: shortcut-fe for Linux 6.18+
        echo "=== Patching shortcut-fe ==="
        SRC="package/qca/shortcut-fe/shortcut-fe/src"
        if [ -d "$SRC" ]; then
          for f in "$SRC/sfe_ipv4.c" "$SRC/sfe_ipv6.c"; do
            [ -f "$f" ] || continue
            grep -q "<linux/timer.h>" "$f" || sed -i "/#include <linux\\/version.h>/i #include <linux/timer.h>" "$f"
            sed -i "s/from_timer(si, tl, timer)/container_of(tl, typeof(*si), timer)/g" "$f"
            sed -i "s/del_timer_sync(\&si->timer)/timer_delete_sync(\\\\&si->timer)/g" "$f"
            echo "  Patched $f"
          done
          sed -i "s/-Werror/-Wno-deprecated-declarations/g" "$SRC/Makefile"
          grep -q "DSFE_SUPPORT_IPV6" "$SRC/Makefile" || sed -i "/^ccflags-y/s/$/ -DSFE_SUPPORT_IPV6/" "$SRC/Makefile"
          rm -rf build_dir/target-*/linux-*/shortcut-fe 2>/dev/null || true
          sed -i "s/tn->tcp_no_window_check)/0) \\/* tcp_no_window_check removed in Linux 6.18+ *\\//" "$SRC/sfe_cm.c"
          echo "  Patched sfe_cm.c"
        fi
        echo "  All build fixes applied"
    - name: Compile the firmware
      id: compile
      run: |
        set -euo pipefail
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Show ccache statistics
      if: always()
      run: |
        ccache -s || true
        du -sh ~/.ccache || true

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        set -euo pipefail
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        set -euo pipefail
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@v1.2.2
      with:
        retain_days: 7
        keep_minimum_runs: 5

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.1.0
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
