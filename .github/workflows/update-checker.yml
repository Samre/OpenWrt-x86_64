# File: .github/workflows/update-checker.yml
# Description: Checks upstream for new commits and triggers a build
#

name: Update Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 5'  # Fridays at 00:00 Asia/Shanghai (UTC+8)

env:
  UPSTREAM_REPO: coolsnowwolf/lede
  UPSTREAM_BRANCH: master

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Check for upstream updates
      id: check
      run: |
        set -euo pipefail

        LATEST_SHA=$(gh api "repos/$UPSTREAM_REPO/commits/$UPSTREAM_BRANCH" \
          --jq '.sha')
        echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT

        TRACKING_TAG="upstream-tracker"
        LAST_KNOWN=$(git tag -l "$TRACKING_TAG" --format='%(refname:strip=2)' || true)

        if git rev-parse "$LAST_KNOWN" >/dev/null 2>&1 && \
           [ "$(git rev-parse "$LAST_KNOWN")" = "$LATEST_SHA" ]; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No new commits since last check."
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "New commits detected or first run. Triggering build."
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trigger build workflow
      if: steps.check.outputs.changed == 'true'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: update-detected
        client-payload: '{"sha": "${{ steps.check.outputs.latest_sha }}"}'

    - name: Update tracking tag
      if: steps.check.outputs.changed == 'true'
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f upstream-tracker ${{ steps.check.outputs.latest_sha }}
        git push -f origin upstream-tracker
